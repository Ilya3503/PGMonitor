groups:
- name: PostgreSQL
  rules:

  - alert: HighConnectionCount
    expr: pg_stat_activity_count > 120
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Большое количество соединений"

  - alert: LowCacheHitRatio
    expr: (pg_stat_database_blks_hit{datname="dvdrental"} + pg_stat_database_blks_read{datname="dvdrental"}) > 0 and (pg_stat_database_blks_hit{datname="dvdrental"} / (pg_stat_database_blks_hit{datname="dvdrental"} + pg_stat_database_blks_read{datname="dvdrental"})) < 0.95
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Cache hit ratio ниже 95%"

  - alert: SlowQueries
    expr: increase(pg_stat_statements_max_exec_time[5m]) > 1000
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Медленные запросы"

  - alert: HighWALGenerationRate
    expr: rate(pg_wal_size_bytes[5m]) > 1e6
    for: 3m
    labels:
      severity: warning