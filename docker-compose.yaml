services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    shm_size: 512m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./configs/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:rw
      - ./configs/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:rw
      - ./configs/postgres/init:/docker-entrypoint-initdb.d
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 6G
        reservations:
          cpus: '1.0'
          memory: 3G


    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 5



  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy


  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    command:
      - "--config.file=/etc/postgres_exporter.yml"
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/etc/queries/queries.yaml"
    volumes:
      - ./configs/postgres_exporter/postgres_exporter.yml:/etc/postgres_exporter.yml:ro
      - ./configs/postgres_exporter/queries.yaml:/etc/queries/queries.yaml:ro
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./configs/rules.yml:/etc/prometheus/rules.yml
    depends_on:
      - postgres-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./configs/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  app-load:
    build: ./app
    container_name: app-load
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9100:9100"


  pg-advisor:
    build: ./analyzer
    container_name: pg-advisor
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      TOTAL_RAM_MB: 1024
      ANALYSIS_INTERVAL_SEC: 60
      ADVISOR_PORT: 9188
    ports:
      - "9188:9188"
    volumes:
      - advisor_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgadmin_data:
  grafana_data:
  adviser_data: